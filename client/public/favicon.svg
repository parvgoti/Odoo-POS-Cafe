<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle with warm dark color -->
  <rect width="64" height="64" rx="14" fill="#1a1008"/>

  <!-- Steam wisps -->
  <path d="M22 10 Q23 7 22 4" stroke="#c97d2e" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M27 10 Q28.5 6.5 27 3" stroke="#c97d2e" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M32 10 Q33 7 32 4" stroke="#c97d2e" stroke-width="1.8" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- Cup body -->
  <path d="M14 16 H44 L40 46 Q39.5 50 35 50 H23 Q18.5 50 18 46 Z" fill="#c97d2e"/>

  <!-- Cup highlight -->
  <path d="M16 16 H42 L38.5 44 Q38 48 34 48 H24 Q20 48 19.5 44 Z" fill="#e8973a"/>

  <!-- Inner liquid (coffee) -->
