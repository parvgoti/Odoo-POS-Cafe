  <!-- Handle -->
  <path d="M44 22 Q54 22 54 30 Q54 38 44 38" stroke="#c97d2e" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M44 25 Q50 25 50 30 Q50 35 44 35" stroke="#e8973a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Saucer -->
  <ellipse cx="29" cy="51" rx="18" ry="3.5" fill="#c97d2e"/>
  <ellipse cx="29" cy="51" rx="14" ry="2.5" fill="#e8973a"/>
</svg>